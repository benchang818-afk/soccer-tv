<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 我的專屬世界盃雙視窗看球控制台 (真實直播相容版)</title>
    <style>
        body { 
            background-color: #0b0f19; 
            color: #ffffff; 
            font-family: sans-serif; 
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #00ff66; margin-bottom: 20px; font-size: 24px; }
        
        /* 雙視窗左右排版 */
        .workspace {
            display: flex;
            width: 100%;
            max-width: 1200px;
            gap: 20px;
            box-sizing: border-box;
        }

        /* 👈 左側：手動比分控制台 */
        .control-panel {
            flex: 1;
            background: #151c2c;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .team-box { margin: 10px 0; }
        .team-name { font-size: 20px; font-weight: bold; color: #00e5ff; margin-bottom: 10px; }
        .btn-score {
            background: #00ff66; color: #0b0f19; border: none; padding: 10px 20px;
            font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; margin: 5px;
        }
        .btn-score.minus { background: #ff4560; color: white; }
        .score-display {
            font-size: 64px;
            font-weight: bold;
            color: #00ff66;
            font-family: monospace;
            background: #0b0f19; padding: 10px; border-radius: 8px; margin: 15px 0;
        }

        /* 👉 右側：Yahoo新聞/愛爾達授權免費網路直播窗 */
        .video-panel {
            flex: 1.8;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #1f293d;
        }
        .video-panel iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <h1>🏆 我的專屬世界盃雙視窗看球控制台</h1>

    <div class="workspace">
        
        <!-- 👈 左側控制台 -->
        <div class="control-panel">
            <div class="team-name">⚽ 2026 世界盃即時比分控制</div>
            <div>
                <span style="color:#00e5ff; font-weight:bold;">主隊 (HOME)</span> VS 
                <span style="color:#ff4560; font-weight:bold;">客隊 (AWAY)</span>
            </div>
            <div class="score-display">
                <span id="homeScore">0</span> : <span id="awayScore">0</span>
            </div>
            <div class="team-box">
                <button class="btn-score" onclick="changeScore('home', 1)">主隊進球 +1</button>
                <button class="btn-score minus" onclick="changeScore('home', -1)">-1</button>
            </div>
            <div class="team-box">
                <button class="btn-score" style="background:#ff4560; color:white;" onclick="changeScore('away', 1)">客隊進球 +1</button>
                <button class="btn-score minus" onclick="changeScore('away', -1)">-1</button>
            </div>
        </div>

        <!-- 👉 右側視窗：直連 Yahoo 體育官方世界盃免費直播嵌入窗 -->
        <div class="video-panel">
            <!-- 採用 Yahoo 新聞與 LINE TODAY 共用的合法公開電視直播框架，完全不鎖 file:// 協議 -->
            <iframe src="https://yahoo.com" allow="autoplay; fullscreen" allowfullscreen></iframe>
        </div>

    </div>

    <script>
        let home = 0, away = 0;
        function changeScore(team, value) {
            if (team === 'home') {
                home = Math.max(0, home + value);
                document.getElementById('homeScore').innerText = home;
            } else {
                away = Math.max(0, away + value);
                document.getElementById('awayScore').innerText = away;
            }
        }
    </script>
</body>
</html>
