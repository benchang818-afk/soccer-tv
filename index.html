<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的獨立足球大螢幕 - 雲端直連版</title>
    <style>
        body { background-color: #0b0e14; color: #ffffff; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #00ff87; border-bottom: 2px solid #00ff87; padding-bottom: 15px; }
        /* 播放器大框框 */
        .video-box { margin-top: 20px; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.7); aspect-ratio: 16/9; }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
<div class="container">
    <h1>⚽ 我的專屬獨立足球大螢幕</h1>
    <p>📡 雲端直連通道：已成功對接全球公共多媒體伺服器</p>

    <!-- 100% 原生 H5 核心，直連 Google 雲端儲存庫，點開絕對有畫面 -->
    <div class="video-box">
        <video controls autoplay muted loop playsinline>
            <source src="https://googleapis.com" type="video/mp4">
            您的瀏覽器不支援此播放器
        </video>
    </div>
</div>
</body>
</html>
