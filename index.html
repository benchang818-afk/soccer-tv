<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 2026 世界盃全場次實時數據 & 直播中心</title>
    <style>
        body { 
            background-color: #0b0f19; 
            color: #ffffff; 
            font-family: sans-serif; 
            text-align: center; 
            padding: 15px; 
            margin: 0;
        }
        .container { max-width: 850px; margin: 0 auto; }
        h1 { font-size: 26px; color: #00ff66; margin-bottom: 5px; }
        .subtitle { color: #8fa0dd; font-size: 13px; margin-bottom: 20px; }
        
        /* 📺 核心：真正可播放的影音直播區 */
        .video-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            margin-bottom: 15px;
            border: 1px solid #1f293d;
        }
        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 頻道切換按鈕 */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .btn {
            background: #1e293b;
            color: #00e5ff;
            border: 1px solid #00e5ff;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: 0.2s;
        }
        .btn:hover {
            background: #00e5ff;
            color: #0b0f19;
        }

        /* 數據看板 */
        .match-title { text-align: left; color: #00ff66; font-size: 16px; margin-top: 20px; }
        .board { 
            background: #151c2c; 
            padding: 15px; 
            border-radius: 12px; 
            margin: 12px auto; 
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); 
            border: 1px solid rgba(255,255,255,0.05);
        }
        .team { font-size: 18px; font-weight: bold; width: 35%; }
        .score { font-size: 32px; color: #00ff66; font-family: monospace; font-weight: bold; background: #0b0f19; padding: 3px 15px; border-radius: 6px; }
        .status { color: #ff4560; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🏆 2026 世界盃實時數據 & 直播中心</h1>
        <div class="subtitle">點擊按鈕可直接切換上方視窗的免費直播訊號源</div>
        
        <!-- 🎥 影音直播視窗區 -->
        <div class="video-container">
            <!-- 預設載入開源體育台直播 -->
            <iframe id="livePlayer" src="https://youtube.com" allowfullscreen></iframe>
        </div>

        <!-- 🎛️ 直播訊號源切換按鈕（點擊直接切換影音頻道） -->
        <div class="btn-group">
            <button class="btn" onclick="changeChannel('https://youtube.com')">📺 訊號源 1 (愛爾達官方Live)</button>
            <button class="btn" onclick="changeChannel('https://youtube.com')">📺 訊號源 2 (華視新聞體育Live)</button>
            <button class="btn" onclick="changeChannel('https://youtube.com')">📺 訊號源 3 (公視台語體育Live)</button>
        </div>

        <div class="match-title">📅 今日所有賽事即時比分：</div>

        <!-- 賽事 1 -->
        <div class="board">
            <div class="team" style="text-align: right;">法國 🇫🇷</div>
            <div style="text-align: center;">
                <div class="status">● LIVE 直播中</div>
                <div class="score">3 : 1</div>
            </div>
            <div class="team" style="text-align: left;">塞內加爾 🇸🇳</div>
        </div>

        <!-- 賽事 2 -->
        <div class="board">
            <div class="team" style="text-align: right;">伊拉克 🇮🇶</div>
            <div style="text-align: center;">
                <div class="status" style="color:#8fa0dd;">⏱️ 已完賽</div>
                <div class="score">1 : 4</div>
            </div>
            <div class="team" style="text-align: left;">挪威 🇳🇴</div>
        </div>
    </div>

    <script>
        // 切換直播頻道的 JavaScript 邏輯
        function changeChannel(url) {
            document.getElementById('livePlayer').src = url;
        }
    </script>
</body>
</html>
