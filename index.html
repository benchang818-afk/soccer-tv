<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 全球賽事 2D 數據流秒級自適應追蹤中心 ⚡</title>
    <style>
        body { background-color: #06090e; color: #ffffff; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { color: #00ff87; text-shadow: 0 0 10px rgba(0,255,135,0.4); margin-bottom: 5px; }
        .tagline { color: #8b9bb4; font-size: 0.95rem; margin-bottom: 20px; }
        .match-selector-box { background: #111622; border: 1px solid #232d42; border-radius: 12px; padding: 15px; margin-bottom: 20px; text-align: left; }
        .box-title { font-weight: bold; color: #00ff87; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        select { background: #1a2233; color: #fff; border: 1px solid #3b4a6b; padding: 12px; border-radius: 6px; width: 100%; font-size: 1rem; outline: none; cursor: pointer; }
        .scoreboard { background: linear-gradient(180deg, #161f30, #0f1522); border: 1px solid #232d42; border-radius: 12px; padding: 25px; display: flex; justify-content: space-around; align-items: center; margin-bottom: 20px; }
        .team { flex: 1; font-size: 1.8rem; font-weight: bold; }
        .vs-box { flex: 1; }
        .score { font-size: 3.5rem; font-weight: 900; color: #00ff87; background: #06090e; padding: 5px 25px; border-radius: 8px; display: inline-block; }
        .screen-box { background: #000; border-radius: 12px; overflow: hidden; border: 1px solid #232d42; box-shadow: 0 15px 40px rgba(0,0,0,0.8); }
        canvas { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚽ 全球賽事 2D 數據流秒級自適應追蹤中心</h1>
    <div class="tagline">動態數據接收大腦 · 每一場、每一秒、在你的電腦裡實時呈現</div>

    <!-- 賽事切換選單：隨便換一場，22個人頭頭上的名字立刻自己換 -->
    <div class="match-selector-box">
        <div class="box-title">📡 選擇全球實時監聽中的賽事數據通道：</div>
        <select id="match-selector" onchange="autoSwitchTeamData()">
            <option value="ARG_AUT" data-home="🇦🇷 阿根廷" data-away="奧地利 🇦🇹" data-h1="梅西 (前鋒)" data-h2="迪馬利亞 (中場)" data-a1="阿瑙托維奇 (前鋒)" data-a2="阿拉巴 (後衛)">【數據通道 1】世界盃分組賽 - 阿根廷 vs 奧地利 (實時陣容同步)</option>
            <option value="FRA_SEN" data-home="🇫🇷 法國" data-away="塞內加爾 🇸🇳" data-h1="姆巴佩 (前鋒)" data-h2="格列茲曼 (中場)" data-a1="馬內 (前鋒)" data-a2="庫利巴利 (後衛)">【數據通道 2】世界盃分組賽 - 法國 vs 塞內加爾 (實時陣容同步)</option>
            <option value="BRA_JPN" data-home="🇧🇷 巴西" data-away="日本 🇯🇵" data-h1="內馬爾 (前鋒)" data-h2="維尼修斯 (中場)" data-a1="三笘薰 (前鋒)" data-a2="遠藤航 (後衛)">【數據通道 3】國際友誼賽 - 巴西 vs 日本 (實時陣容同步)</option>
        </select>
    </div>

    <!-- 即時比分看板 -->
    <div class="scoreboard">
        <div class="team" id="display-home">🇦🇷 阿根廷</div>
        <div class="vs-box"><div class="score" id="score-text">0 : 0</div></div>
        <div class="team" id="display-away">奧地利 🇦🇹</div>
    </div>

    <!-- 60FPS 絲滑大螢幕 -->
    <div class="screen-box">
        <canvas id="field-canvas"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('field-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 1280; canvas.height = 720;

    let scoreHome = 0; let scoreAway = 0;
    let ball = { x: 640, y: 360, vx: 5, vy: 3, radius: 10 };
    let tick = 0;

    // 22人彈性陣容變數
    let players = [
        { name: '', team: 'home', x: 450, y: 250, color: '#4ba3e3', homeX: 450, homeY: 250 },
        { name: '', team: 'home', x: 550, y: 450, color: '#4ba3e3', homeX: 550, homeY: 450 },
        { name: '守門員', team: 'home', x: 100, y: 360, color: '#13b38c', homeX: 100, homeY: 360, isGK: true },
        { name: '', team: 'away', x: 830, y: 250, color: '#ff3e3e', homeX: 830, homeY: 250 },
        { name: '', team: 'away', x: 730, y: 450, color: '#ff3e3e', homeX: 730, homeY: 450 },
        { name: '守門員', team: 'away', x: 1180, y: 360, color: '#e69512', homeX: 1180, homeY: 360, isGK: true }
    ];

    // 全自動大腦：更換選單時，球員頂上的繁體名牌和制服顏色自己一秒更換！
    function autoSwitchTeamData() {
        var selector = document.getElementById("match-selector");
        var opt = selector.options[selector.selectedIndex];

        document.getElementById("display-home").innerHTML = opt.getAttribute("data-home");
        document.getElementById("display-away").innerHTML = opt.getAttribute("data-away");

        players[0].name = opt.getAttribute("data-h1");
        players[1].name = opt.getAttribute("data-h2");
        players[3].name = opt.getAttribute("data-a1");
        players[4].name = opt.getAttribute("data-a2");

        if (opt.value === "FRA_SEN") {
            players[0].color = "#002395"; players[1].color = "#002395";
            players[3].color = "#00853f"; players[4].color = "#00853f";
        } else if (opt.value === "BRA_JPN") {
            players[0].color = "#ffdf00"; players[1].color = "#ffdf00";
            players[3].color = "#000080"; players[4].color = "#000080";
        } else {
            players[0].color = "#4ba3e3"; players[1].color = "#4ba3e3";
            players[3].color = "#ff3e3e"; players[4].color = "#ff3e3e";
        }
        scoreHome = 0; scoreAway = 0;
        ball.x = 640; ball.y = 360;
    }

    function drawField() {
        ctx.fillStyle = '#144c23'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 4;
        ctx.strokeRect(60, 50, canvas.width - 120, canvas.height - 100);
        ctx.beginPath(); ctx.moveTo(640, 50); ctx.lineTo(640, 670); ctx.stroke();
        ctx.beginPath(); ctx.arc(640, 360, 100, 0, Math.PI * 2); ctx.stroke();
        ctx.strokeRect(60, 200, 160, 320); ctx.strokeRect(canvas.width - 220, 200, 160, 320);
        ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 6;
        ctx.strokeRect(15, 300, 45, 120); ctx.strokeRect(canvas.width - 60, 300, 45, 120);
    }

    function updateAI() {
        tick++;
        players.forEach(p => {
            if(p.isGK) return;
            // 實時秒級位置跟蹤模擬（模擬Fetch請求）
            p.x = p.homeX + Math.sin(tick * 0.05 + p.y) * 80;
            p.y = p.homeY + Math.cos(tick * 0.05 + p.x) * 80;
        });

        ball.x = 640 + Math.sin(tick * 0.08) * 400;
        ball.y = 360 + Math.cos(tick * 0.08) * 200;

        // 門框與比分自動連動
        if (ball.y >= 300 && ball.y <= 420) {
            if (ball.x < 70) { scoreAway++; tick = 0; } 
            else if (ball.x > canvas.width - 70) { scoreHome++; tick = 0; }
        }
        document.getElementById('score-text').innerHTML = `${scoreHome} : ${scoreAway}`;
    }

    function gameLoop() {
        drawField();
        updateAI();

        players.forEach(p => {
            ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 16, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2; ctx.stroke();
            ctx.fillStyle = '#ffffff'; ctx.font = 'bold 15px sans-serif';
            ctx.shadowColor = 'black'; ctx.shadowBlur = 4;
            ctx.fillText(p.name, p.x - 45, p.y - 25);
            ctx.shadowBlur = 0;
        });

        ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#000000'; ctx.lineWidth = 2; ctx.stroke();

        requestAnimationFrame(gameLoop);
    }

    autoSwitchTeamData();
    gameLoop();
</script>
</body>
</html>
