<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>🏆 2026 世界盃實時數據追蹤中心</title>
    <style>
        body { background-color: #0b0f19; color: #ffffff; font-family: sans-serif; text-align: center; padding: 50px; }
        .board { background: #151c2c; padding: 30px; border-radius: 16px; max-width: 600px; margin: 20px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .score { font-size: 64px; color: #00ff66; font-family: monospace; font-weight: bold; margin: 20px 0; }
        .status { color: #00e5ff; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🏆 2026 世界盃實時數據追蹤中心</h1>
    <div class="board">
        <div class="status" id="state">正在連線至世界盃公開資料庫...</div>
        <h2 id="teams">載入中...</h2>
        <div class="score" id="score">0 : 0</div>
    </div>

    <script>
        async function getData() {
            try {
                // 直接向網路上免費的公開伺服器抓資料
                const res = await fetch('https://worldcup26.ir');
                const result = await res.json();
                const game = result.data || result;
                
                if (!game || game.length === 0) {
                    document.getElementById('state').innerText = "⏱️ 狀態：未開賽";
                    document.getElementById('teams').innerText = "目前沒有正在進行的比賽";
                    return;
                }
                document.getElementById('state').innerText = `⏱️ 狀態：${game.status || '直播中'}`;
                document.getElementById('teams').innerText = `${game.home_team} VS ${game.away_team}`;
                document.getElementById('score').innerText = `${game.home_score ?? 0} : ${game.away_score ?? 0}`;
            } catch (e) {
                document.getElementById('state').innerText = "❌ 連線暫時失敗";
                document.getElementById('teams').innerText = "請務必在 VS Code 中點擊「Go Live」按鈕打開此網頁";
            }
        }
        getData();
        setInterval(getData, 30000); // 每 30 秒自動更新比分
    </script>
</body>
</html>
