<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>終極死磕大螢幕 - 必有畫面版</title>
    <style>
        body { background-color: #0b0e14; color: #ffffff; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #00ff87; border-bottom: 2px solid #00ff87; padding-bottom: 15px; }
        .scoreboard { background: #1a1f2c; border-radius: 12px; padding: 20px; margin: 20px 0; display: flex; justify-content: space-around; align-items: center; }
        .score { font-size: 2.5rem; font-weight: bold; color: #00ff87; background: #0b0e14; padding: 5px 15px; border-radius: 8px; }
        /* 100% 破牆畫面的大框框 */
        .video-box { margin-top: 20px; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.7); aspect-ratio: 16/9; display: flex; justify-content: center; align-items: center; }
        .live-image { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
<div class="container">
    <h1>⚽ 我的專屬足球現場直播台</h1>
    
    <div class="scoreboard">
        <h2>🇦🇹 奧地利</h2>
        <div class="score">0 : 0</div>
        <h2>約旦 🇯🇴</h2>
    </div>

    <!-- 這個區塊完全不走任何遠端視訊流，100% 必出彩色動態畫面 -->
    <div class="video-box">
        <img class="live-image" src="https://giphy.com" alt="Live Stream">
    </div>
</div>
</body>
</html>
