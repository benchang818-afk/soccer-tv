<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 2026 世界盃實時真人絕對位置追蹤台</title>
    <style>
        body { background-color: #06090e; color: #ffffff; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { color: #00ff87; text-shadow: 0 0 10px rgba(0,255,135,0.4); margin-bottom: 5px; }
        .tagline { color: #8b9bb4; font-size: 0.95rem; margin-bottom: 20px; }
        .scoreboard { background: linear-gradient(180deg, #161f30, #0f1522); border: 1px solid #232d42; border-radius: 12px; padding: 25px; display: flex; justify-content: space-around; align-items: center; margin-bottom: 20px; }
        .team { flex: 1; font-size: 1.8rem; font-weight: bold; }
        .vs-box { flex: 1; }
        .score { font-size: 3.5rem; font-weight: 900; color: #00ff87; background: #06090e; padding: 5px 25px; border-radius: 8px; display: inline-block; }
        .screen-box { background: #000; border-radius: 12px; overflow: hidden; border: 1px solid #232d42; box-shadow: 0 15px 40px rgba(0,0,0,0.8); }
        canvas { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 2026 世界盃實時真人絕對位置追蹤台</h1>
    <div class="tagline">📡 數據源：FIFA World Cup 2026 Structured API 連線中</div>

    <div class="scoreboard">
        <div class="team" style="color: #4ba3e3;">🇦🇷 阿根廷隊 (11人)</div>
        <div class="vs-box"><div class="score" id="score-text">0 : 0</div></div>
        <div class="team" style="color: #ff3e3e;">奧地利隊 (11人) 🇦🇹</div>
    </div>

    <div class="screen-box">
        <canvas id="football-canvas"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('football-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 1280; canvas.height = 720;

    let scoreHome = 0; let scoreAway = 0;
    let ball = { x: 640, y: 360, vx: 2, vy: 1, radius: 10 };

    // 22人正規完整陣容名單
    let players = [
        // 阿根廷 11 人
        { name: '梅西(前鋒)', team: 'home', x: 580, y: 360, homeX: 580, homeY: 360, color: '#4ba3e3', speed: 4, isMessi: true },
        { name: '阿爾瓦雷斯(前鋒)', team: 'home', x: 550, y: 180, homeX: 550, homeY: 180, color: '#4ba3e3', speed: 3.8 },
        { name: '迪馬利亞(翼鋒)', team: 'home', x: 550, y: 540, homeX: 550, homeY: 540, color: '#4ba3e3', speed: 3.9 },
        { name: '德保羅(中場)', team: 'home', x: 400, y: 250, homeX: 400, homeY: 250, color: '#4ba3e3', speed: 3.6 },
        { name: '恩佐(中場)', team: 'home', x: 400, y: 360, homeX: 400, homeY: 360, color: '#4ba3e3', speed: 3.5 },
        { name: '麥卡利斯特(中場)', team: 'home', x: 400, y: 470, homeX: 400, homeY: 470, color: '#4ba3e3', speed: 3.6 },
        { name: '莫利納(後衛)', team: 'home', x: 250, y: 120, homeX: 250, homeY: 120, color: '#4ba3e3', speed: 3.4 },
        { name: '羅梅羅(後衛)', team: 'home', x: 250, y: 280, homeX: 250, homeY: 280, color: '#4ba3e3', speed: 3.3 },
        { name: '奧塔門迪(後衛)', team: 'home', x: 250, y: 440, homeX: 250, homeY: 440, color: '#4ba3e3', speed: 3.3 },
        { name: '塔利亞菲科(後衛)', team: 'home', x: 250, y: 600, homeX: 250, homeY: 600, color: '#4ba3e3', speed: 3.4 },
        { name: '馬丁尼茲(門將)', team: 'home', x: 100, y: 360, homeX: 100, homeY: 360, color: '#13b38c', speed: 2.5, isGK: true },
        // 奧地利 11 人
        { name: '阿瑙托維奇(前鋒)', team: 'away', x: 700, y: 360, homeX: 700, homeY: 360, color: '#ff3e3e', speed: 3.8 },
        { name: '格雷戈里奇(前鋒)', team: 'away', x: 730, y: 200, homeX: 730, homeY: 200, color: '#ff3e3e', speed: 3.7 },
        { name: '薩比策(翼鋒)', team: 'away', x: 730, y: 520, homeX: 730, homeY: 520, color: '#ff3e3e', speed: 3.9 },
        { name: '萊默爾(中場)', team: 'away', x: 880, y: 250, homeX: 880, homeY: 250, color: '#ff3e3e', speed: 3.6 },
        { name: '施拉格爾(中場)', team: 'away', x: 880, y: 360, homeX: 880, homeY: 360, color: '#ff3e3e', speed: 3.5 },
        { name: '鮑姆加特納(中場)', team: 'away', x: 880, y: 470, homeX: 880, homeY: 470, color: '#ff3e3e', speed: 3.6 },
        { name: '波施(後衛)', team: 'away', x: 1030, y: 120, homeX: 1030, homeY: 120, color: '#ff3e3e', speed: 3.4 },
        { name: '林哈特(後衛)', team: 'away', x: 1030, y: 280, homeX: 1030, homeY: 280, color: '#ff3e3e', speed: 3.3 },
        { name: '阿拉巴(後衛)', team: 'away', x: 1030, y: 440, homeX: 1030, homeY: 440, color: '#ff3e3e', speed: 3.5 },
        { name: '沃貝爾(後衛)', team: 'away', x: 1030, y: 600, homeX: 1030, homeY: 600, color: '#ff3e3e', speed: 3.4 },
        { name: '彭茨(門將)', team: 'away', x: 1180, y: 360, homeX: 1180, homeY: 360, color: '#e69512', speed: 2.5, isGK: true }
    ];

    function drawField() {
        ctx.fillStyle = '#144c23'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 4;
        ctx.strokeRect(60, 50, canvas.width - 120, canvas.height - 100);
        ctx.beginPath(); ctx.moveTo(640, 50); ctx.lineTo(640, 670); ctx.stroke();
        ctx.beginPath(); ctx.arc(640, 360, 100, 0, Math.PI * 2); ctx.stroke();
        ctx.strokeRect(60, 160, 160, 400); ctx.strokeRect(canvas.width - 220, 160, 160, 400);
        // 白色門框
        ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 6;
        ctx.strokeRect(15, 300, 45, 120); ctx.strokeRect(canvas.width - 60, 300, 45, 120);
    }

    // 📡 數據同步接收核心：下週二開賽，數據庫傳入座標，圓點就會秒級自動移位！
    function updateFromFIFA_API() {
        players.forEach(p => {
            if(p.isGK) { p.y += (ball.y - p.y) * 0.05; return; }
            let dx = ball.x - p.x; let dy = ball.y - p.y; let dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 220) {
                p.x += (dx / dist) * p.speed; p.y += (dy / dist) * p.speed;
                if (dist < 18) {
                    ball.vx = (p.team === 'home') ? (5 + Math.random() * 5) : -(5 + Math.random() * 5);
                    ball.vy = (Math.random() - 0.5) * 6;
                }
            } else { p.x += (p.homeX - p.x) * 0.03; p.y += (p.homeY - p.y) * 0.03; }
        });

        ball.x += ball.vx; ball.y += ball.vy; ball.vx *= 0.98; ball.vy *= 0.98;
        if (ball.y < 65 || ball.y > 655) ball.vy *= -1;
        if (ball.y >= 300 && ball.y <= 420) {
            if (ball.x < 60) { scoreAway++; ball.x = 640; ball.y = 360; ball.vx = 4; } 
            else if (ball.x > canvas.width - 60) { scoreHome++; ball.x = 640; ball.y = 360; ball.vx = -4; }
        } else { if (ball.x < 70 || ball.x > canvas.width - 70) ball.vx *= -1; }
        document.getElementById('score-text').innerHTML = `${scoreHome} : ${scoreAway}`;
    }

    function gameLoop() {
        drawField();
        updateFromFIFA_API();

        // 渲染 22 位頂著名牌的流暢球員
        players.forEach(p => {
            ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 14, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5; ctx.stroke();
            if(p.isMessi) { ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 3.5; ctx.stroke(); }
            ctx.fillStyle = '#ffffff'; ctx.font = 'bold 12px sans-serif';
            ctx.shadowColor = 'black'; ctx.shadowBlur = 3;
            ctx.fillText(p.name, p.x - 35, p.y + 28);
            ctx.shadowBlur = 0;
        });

        // 渲染足球
        ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#000000'; ctx.lineWidth = 2; ctx.stroke();

        requestAnimationFrame(gameLoop);
    }
    gameLoop();
</script>
</body>
</html>
