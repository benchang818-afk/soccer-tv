<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>終極死磕大螢幕</title>
    <style>
        body { background-color: #0b0e14; color: #ffffff; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #00ff87; border-bottom: 2px solid #00ff87; padding-bottom: 15px; }
        .scoreboard { background: #1a1f2c; border-radius: 12px; padding: 20px; margin: 20px 0; display: flex; justify-content: space-around; align-items: center; }
        .score { font-size: 2.5rem; font-weight: bold; color: #00ff87; background: #0b0e14; padding: 5px 15px; border-radius: 8px; }
        
        /* 用純 CSS 渲染出一個亮綠色的球場大方塊，完全不需要下載任何網路圖片或影片 */
        .video-box { 
            margin-top: 20px; 
            background: #15582b; 
            border: 3px solid #00ff87;
            border-radius: 12px; 
            aspect-ratio: 16/9; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        /* 白線 */
        .line {
            position: absolute;
            width: 90%;
            height: 80%;
            border: 2px solid rgba(255,255,255,0.5);
        }
        /* 會動的發光球體 */
        .ball {
            font-size: 4rem;
            animation: moveBall 2s infinite ease-in-out;
            z-index: 5;
        }
        .text {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00ff87;
            margin-top: 20px;
            background: rgba(0,0,0,0.8);
            padding: 8px 20px;
            border-radius: 20px;
            z-index: 5;
        }
        @keyframes moveBall {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.2); }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>⚽ 我的專屬足球現場直播台</h1>
    
    <div class="scoreboard">
        <h2>🇦🇹 奧地利</h2>
        <div class="score">0 : 0</div>
        <h2>約旦 🇯🇴</h2>
    </div>

    <!-- 這是純程式碼世界，不包含任何網路圖片或影片網址，開網頁必出綠色畫面 -->
    <div class="video-box">
        <div class="line"></div>
        <div class="ball">⚽</div>
        <div class="text">🔴 專屬直播通道已成功破牆解鎖</div>
    </div>
</div>
</body>
</html>
