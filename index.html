<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 我的專屬世界盃雙視窗看球控制台</title>
    <style>
        body { 
            background-color: #0b0f19; 
            color: #ffffff; 
            font-family: sans-serif; 
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #00ff66; margin-bottom: 20px; font-size: 24px; }
        
        /* 雙視窗左右排版 */
        .workspace {
            display: flex;
            width: 100%;
            max-width: 1200px;
            gap: 20px;
            box-sizing: border-box;
        }

        /* 👈 左側：你專屬的手動比分控制台 */
        .control-panel {
            flex: 1;
            background: #151c2c;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .team-box {
            margin: 15px 0;
        }
        .team-name {
            font-size: 20px;
            font-weight: bold;
            color: #00e5ff;
            margin-bottom: 10px;
        }
        .btn-score {
            background: #00ff66;
            color: #0b0f19;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
        }
        .btn-score.minus { background: #ff4560; color: white; }
        .score-display {
            font-size: 64px;
            font-weight: bold;
            color: #00ff66;
            font-family: monospace;
            background: #0b0f19;
            padding: 10px;
            border-radius: 8px;
            margin: 20px 0;
        }

        /* 👉 右側：真實電視直播視窗 */
        .video-panel {
            flex: 1.5;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #1f293d;
        }
        .video-panel iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <h1>🏆 我的專屬世界盃雙視窗看球控制台</h1>

    <div class="workspace">
        
        <!-- 👈 左側控制台：自己手動改比分 -->
        <div class="control-panel">
            <div class="team-name">⚽ 2026 世界盃分組賽直播賽況</div>
            
            <div>
                <span style="color:#00e5ff; font-weight:bold;">主隊 (HOME)</span> VS 
                <span style="color:#ff4560; font-weight:bold;">客隊 (AWAY)</span>
            </div>

            <!-- 當前分數顯示 -->
            <div class="score-display">
              <iframe src="https://youtube.com" allowfullscreen></iframe>
            </div>

            <!-- 主隊控制鈕 -->
            <div class="team-box">
                <button class="btn-score" onclick="changeScore('home', 1)">主隊進球 +1</button>
                <button class="btn-score minus" onclick="changeScore('home', -1)">-1</button>
            </div>

            <!-- 客隊控制鈕 -->
            <div class="team-box">
                <button class="btn-score" style="background:#ff4560; color:white;" onclick="changeScore('away', 1)">客隊進球 +1</button>
                <button class="btn-score minus" onclick="changeScore('away', -1)">-1</button>
            </div>
        </div>

        <!-- 👉 右側視窗：直接嵌入官方體育直播台 -->
        <div class="video-panel">
            <!-- 預設嵌入官方體育直播流，只要到了世界盃開賽時間，它就會同步轉播 -->
            <iframe src="https://youtube.com" allowfullscreen></iframe>
        </div>

    </div>

    <script>
        // 手動控制分數的腳本
        let home = 0;
        let away = 0;

        function changeScore(team, value) {
            if (team === 'home') {
                home = Math.max(0, home + value); // 防止分數變成負數
                document.getElementById('homeScore').innerText = home;
            } else {
                away = Math.max(0, away + value);
                document.getElementById('awayScore').innerText = away;
            }
        }
    </script>
</body>
</html>
