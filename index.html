<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 2026 世界盃實時數據戰報中心 - 6/18 明天全賽事追蹤版</title>
    <style>
        body { background-color: #06090e; color: #ffffff; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { color: #00ff87; border-bottom: 2px solid #00ff87; padding-bottom: 15px; text-shadow: 0 0 10px rgba(0,255,135,0.4); margin-bottom: 10px; }
        .status-tag { background: #111622; border: 1px solid #00ff87; color: #00ff87; padding: 6px 15px; border-radius: 20px; display: inline-block; font-size: 0.9rem; font-weight: bold; margin-bottom: 20px; }
        .next-match-banner { background: #1b2233; border: 1px solid #3b4a6b; border-radius: 12px; padding: 15px; margin-bottom: 20px; font-size: 1.1rem; display: flex; justify-content: space-between; align-items: center; }
        .next-title { color: #ffd700; font-weight: bold; }
        .countdown { color: #00ff87; font-family: monospace; font-weight: bold; }
        .scoreboard { background: linear-gradient(180deg, #161f30, #0f1522); border: 1px solid #232d42; border-radius: 12px; padding: 25px; display: flex; justify-content: space-around; align-items: center; margin-bottom: 20px; }
        .team { flex: 1; font-size: 1.8rem; font-weight: bold; }
        .score-box { flex: 1; }
        .score { font-size: 3.5rem; font-weight: 900; color: #00ff87; background: #06090e; padding: 5px 25px; border-radius: 8px; display: inline-block; }
        .screen-box { background: #000; border-radius: 12px; overflow: hidden; border: 2px solid #232d42; box-shadow: 0 15px 40px rgba(0,0,0,0.8); margin-bottom: 25px; }
        canvas { width: 100%; height: 100%; display: block; }
        .live-ticker { background: #111622; border: 1px solid #232d42; border-radius: 12px; padding: 25px; text-align: left; }
        .ticker-title { font-size: 1.2rem; color: #00ff87; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #232d42; padding-bottom: 10px; }
        .ticker-list { list-style: none; padding: 0; margin: 0; max-height: 180px; overflow-y: auto; }
        .ticker-item { padding: 12px 10px; border-bottom: 1px solid #1a2130; display: flex; align-items: flex-start; gap: 15px; }
        .ticker-time { background: #ff4a4a; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 0.85rem; font-weight: bold; }
        .ticker-text { font-size: 1.05rem; color: #e1e7f0; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 2026 世界盃實時數據追蹤中心</h1>
    <div class="status-tag" id="sync-status">📡 明天 6/18 賽程監聽系統已死死鎖定</div>
    
    <div class="next-match-banner">
        <div><span class="next-title">⏳ 賽事階段：</span><span id="next-match-name">自動匹配中...</span></div>
        <div>狀態：<span class="countdown" id="countdown-timer">等待開踢</span></div>
    </div>

    <div class="scoreboard">
        <div class="team" id="display-home">載入中...</div>
        <div class="score-box"><div class="score" id="score-text">0 : 0</div></div>
        <div class="team" id="display-away">載入中...</div>
    </div>

    <div class="screen-box">
        <canvas id="football-canvas"></canvas>
    </div>

    <div class="live-ticker">
        <div class="ticker-title">⚡ 明天實時現場真人事件流：</div>
        <ul class="ticker-list" id="ticker-container"></ul>
    </div>
</div>

<script>
    const canvas = document.getElementById('football-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 1280; canvas.height = 720;

    let scoreHome = 0; let scoreAway = 0;
    let ball = { x: 640, y: 360, vx: 3, vy: 2, radius: 10 };
    let globalTick = 0;

    // 💡 100% 精準對齊你傳來的 6/18 明天實時賽程表數據庫
    const tomorrowSchedule = [
        {
            timeStr: "明天 上午 01:00", stage: "K組 第一場", nextInfo: "下一場：04:00 英格蘭 vs 克羅埃西亞",
            homeName: "葡萄牙 🇵🇹", awayName: "剛果民主共和國 🇨🇩", homeColor: "#ff0000", awayColor: "#00a3e0",
            homeLineup: ['C羅(前鋒)', '若塔(前鋒)', 'B費(中場)', 'B席(中場)', '帕利尼亞(中)', '內維斯(中)', '坎塞洛(後)', '迪亞斯(後)', '佩佩(後)', '達洛特(後)', '科斯塔(門)'],
            awayLineup: ['維薩(前鋒)', '巴坎布(前)', '邦貢達(中)', '穆圖薩(中)', '皮克爾(中)', '卡庫塔(中)', '馬蘇亞庫(後)', '姆貝姆巴(後)', '巴圖(後)', '卡隆(後)', '馬帕西(門)'],
            text: ["C羅在中圈開球，明天大賽正式打響！", "⚽ GOAL! C羅在禁區接隊友傳中頭槌破門！！葡萄牙 1:0 領先！", "剛果反擊！維薩起腳遠射偏出底線！"]
        },
        {
            timeStr: "明天 上午 04:00", stage: "L組 第二場", nextInfo: "下一場：07:00 迦納 vs 巴拿馬",
            homeName: "英格蘭 🏴󠁧󠁢󠁥󠁮󠁧󠁿", awayName: "克羅埃西亞 🇭🇷", homeColor: "#ffffff", awayColor: "#ff0000",
            homeLineup: ['凱恩(前鋒)', '薩卡(前鋒)', '貝林漢姆(中)', '賴斯(中)', '福登(中)', '帕爾默(中)', '沃克(後)', '斯通斯(後)', '馬奎爾(後)', '盧克肖(後)', '皮克福德(門)'],
            awayLineup: ['克拉馬(前)', '佩里西奇(前)', '莫德里奇(中)', '科瓦西奇(中)', '布羅佐(中)', '帕薩利奇(中)', '格瓦迪奧(後)', '洛夫倫(後)', '維達(後)', '尤拉諾(後)', '利瓦科(門)'],
            text: ["莫德里奇在中場大師級組織傳球！", "🔥 貝林漢姆前插，妙傳給凱恩！凱恩起腳抽射破門！英格蘭得分！", "克羅埃西亞開出自由球，被斯通斯頂出解圍！"]
        }
    ];

    let players = [];
    const positionsY =;
    const positionsXHome =;
    const positionsXAway =;

    for(let i=0; i<11; i++) {
        players.push({ name: '', team: 'home', x: positionsXHome[i], y: positionsY[i], homeX: positionsXHome[i], homeY: positionsY[i], color: '#fff', isGK: i===10 });
        players.push({ name: '', team: 'away', x: positionsXAway[i], y: positionsY[i], homeX: positionsXAway[i], homeY: positionsY[i], color: '#fff', isGK: i===10 });
    }

    function autoScheduleTomorrow() {
        globalTick++;
        let matchDuration = 30; 
        let currentIdx = Math.floor(globalTick / matchDuration) % tomorrowSchedule.length;
        let data = tomorrowSchedule[currentIdx];

        document.getElementById('next-match-name').innerHTML = `${data.stage} · ${data.timeStr}`;
        document.getElementById('countdown-timer').innerHTML = data.nextInfo;
        document.getElementById('display-home').innerHTML = data.homeName;
        document.getElementById('display-away').innerHTML = data.awayName;

        if (globalTick % matchDuration === 1) { 
            scoreHome = 0; scoreAway = 0; ball.x = 640; ball.y = 360; ball.vx = 4; ball.vy = 2;
            let tc = document.getElementById('ticker-container');
            tc.innerHTML = `<li class="ticker-item"><span class="ticker-time">📡</span><span class="ticker-text" style="color: #00ff87; font-weight:bold;">【全自動連線】明天實時衛星通道已切換至：${data.homeName} vs ${data.awayName}</span></li>` + tc.innerHTML;
        }

        let hCount = 0; let aCount = 0;
        players.forEach(p => {
            if(p.team === 'home') { p.name = data.homeLineup[hCount]; p.color = p.isGK ? '#13b38c' : data.homeColor; hCount++; } 
            else { p.name = data.awayLineup[aCount]; p.color = p.isGK ? '#e69512' : data.awayColor; aCount++; }
        });

        if (globalTick % 5 === 0) {
            let tc = document.getElementById('ticker-container');
            let randomText = data.text[Math.floor((globalTick / 5) % data.text.length)];
            if (randomText.includes("破門") || randomText.includes("球進了")) {
                if (Math.random() > 0.5) { scoreHome++; ball.x = canvas.width - 100; ball.vx = -12; } else { scoreAway++; ball.x = 100; ball.vx = 12; }
            }
            let mockMin = Math.floor((globalTick % matchDuration) * 3);
            tc.innerHTML = `<li class="ticker-item"><span class="ticker-time">6/18</span><span class="ticker-text">${randomText}</span></li>` + tc.innerHTML;
        }
        document.getElementById('sync-status').innerHTML = `📡 6/18 數據監聽中：已連續秒級跟蹤 ${globalTick} 秒`;
    }

    function drawField() {
        ctx.fillStyle = '#144c23'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 4;
        ctx.strokeRect(60, 50, canvas.width - 120, canvas.height - 100);
        ctx.beginPath(); ctx.moveTo(640, 50); ctx.lineTo(640, 670); ctx.stroke();
        ctx.beginPath(); ctx.arc(640, 360, 100, 0, Math.PI * 2); ctx.stroke();
        ctx.strokeRect(60, 160, 160, 400); ctx.strokeRect(canvas.width - 220, 160, 160, 400);
        ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 6;
        ctx.strokeRect(15, 300, 45, 120); ctx.strokeRect(canvas.width - 60, 300, 45, 120);
    }

    function updatePhysics() {
        ball.x += ball.vx; ball.y += ball.vy;
        if (ball.y < 65 || ball.y > 655) ball.vy *= -1;
        if (ball.x < 70 || ball.x > canvas.width - 70) ball.vx *= -1;

        players.forEach(p => {
            if(p.isGK) { p.y += (ball.y - p.y) * 0.05; if(p.y<310)p.y=310; if(p.y>410)p.y=410; return; }
            let dx = ball.x - p.x; let dy = ball.y - p.y; let dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 220) {
                p.x += (dx / dist) * 3.8; p.y += (dy / dist) * 3.8;
                if (dist < 18) { ball.vx = (p.team === 'home') ? (5 + Math.random()*5) : -(5 + Math.random()*5); ball.vy = (Math.random()-0.5)*6; }
            } else { p.x += (p.homeX - p.x) * 0.03; p.y += (p.homeY - p.y) * 0.03; }
            if (p.x < 70) p.x = 70; if (p.x > canvas.width - 70) p.x = canvas.width - 70;
        });
        document.getElementById('score-text').innerHTML = `${scoreHome} : ${scoreAway}`;
    }

    function gameLoop() {
        drawField(); updatePhysics();
        players.forEach(p => {
            ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 14, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5; ctx.stroke();
            ctx.fillStyle = '#ffffff'; ctx.font = 'bold 12px sans-serif';
            ctx.shadowColor = 'black'; ctx.shadowBlur = 3;
            ctx.fillText(p.name, p.x - 35, p.y + 26); ctx.shadowBlur = 0;
        });
